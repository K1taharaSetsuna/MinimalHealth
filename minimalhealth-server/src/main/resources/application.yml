spring:
  application:
    name: minimalhealth-server
  datasource:
    url: jdbc:h2:file:./data/minimalhealth;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:minimalhealth-dev-secret-change-in-production}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
  sms:
    provider: mock
    code-length: 6
    code-expiration-minutes: 5
    rate-limit-seconds: 60

logging:
  level:
    com.minimalhealth: DEBUG
